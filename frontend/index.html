<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GoDB — Database Explorer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f1117;
    --sidebar:   #161b22;
    --panel:     #1c2230;
    --card:      #212836;
    --border:    #2d3748;
    --accent:    #00d084;
    --accent2:   #3b82f6;
    --danger:    #ef4444;
    --warn:      #f59e0b;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --mono:      'JetBrains Mono', 'Fira Code', monospace;
    --sans:      'Inter', system-ui, sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
    font-size: 13px;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 220px;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  #logo {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #logo .icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: #000;
  }
  #logo .name { font-weight: 700; font-size: 15px; letter-spacing: -.3px; }
  #logo .ver  { font-size: 10px; color: var(--muted); }

  #db-label {
    padding: 12px 16px 6px;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  #tables-list { flex: 1; overflow-y: auto; padding-bottom: 8px; }
  .table-item {
    padding: 7px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    border-radius: 0;
    transition: background .12s;
    color: var(--text);
  }
  .table-item:hover  { background: var(--panel); }
  .table-item.active { background: var(--panel); color: var(--accent); }
  .table-item .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }
  .table-item .tname { font-size: 13px; }
  .table-item .tcount {
    margin-left: auto;
    font-size: 10px;
    color: var(--muted);
    background: var(--border);
    padding: 1px 5px;
    border-radius: 10px;
  }

  #add-table-btn {
    margin: 8px 12px;
    padding: 7px;
    border-radius: 6px;
    border: 1px dashed var(--border);
    background: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    transition: all .12s;
    width: calc(100% - 24px);
  }
  #add-table-btn:hover { border-color: var(--accent); color: var(--accent); }

  #sidebar-footer {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── MAIN ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* toolbar */
  #toolbar {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  #toolbar .table-title {
    font-weight: 600;
    font-size: 14px;
    color: var(--accent);
  }
  #toolbar .sep { color: var(--border); }
  #toolbar .record-count { color: var(--muted); font-size: 12px; }
  #toolbar-actions { margin-left: auto; display: flex; gap: 8px; }

  button {
    font-family: var(--sans);
    font-size: 12px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    padding: 6px 12px;
    transition: all .12s;
  }
  .btn-primary { background: var(--accent); color: #000; font-weight: 600; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-ghost {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { filter: brightness(1.1); }

  /* query bar */
  #query-bar {
    background: var(--sidebar);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }
  #query-bar label { color: var(--muted); font-size: 11px; white-space: nowrap; }
  #filter-input, #sort-input, #limit-input {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 5px;
    padding: 5px 10px;
    font-family: var(--mono);
    font-size: 11px;
    transition: border .12s;
  }
  #filter-input { flex: 1; }
  #sort-input   { width: 100px; }
  #limit-input  { width: 60px; }
  #filter-input:focus, #sort-input:focus, #limit-input:focus {
    outline: none; border-color: var(--accent2);
  }

  /* tabs */
  #tabs {
    display: flex;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    gap: 0;
    flex-shrink: 0;
  }
  .tab {
    padding: 8px 14px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .12s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* content area */
  #content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  /* table view */
  #records-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  #records-table th {
    text-align: left;
    padding: 8px 12px;
    background: var(--card);
    color: var(--muted);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .06em;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
  }
  #records-table td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    vertical-align: top;
    max-width: 280px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #records-table tr:hover td { background: var(--card); }
  .id-cell { color: var(--accent2); font-weight: 500; }
  .val-cell { color: var(--text); }
  .action-cell { display: flex; gap: 6px; }
  .btn-sm {
    padding: 3px 8px;
    font-size: 11px;
    border-radius: 4px;
  }

  /* JSON view */
  #json-view {
    display: none;
    flex-direction: column;
    gap: 12px;
  }
  .json-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .json-card-header {
    padding: 8px 14px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
  }
  .json-card-header .jid { color: var(--accent2); }
  .json-card-body {
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .json-key   { color: #7dd3fc; }
  .json-str   { color: #86efac; }
  .json-num   { color: #fbbf24; }
  .json-bool  { color: #f472b6; }

  /* empty state */
  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60%;
    gap: 12px;
    color: var(--muted);
  }
  #empty-state .big { font-size: 48px; }
  #empty-state p { font-size: 13px; }

  /* WAL view */
  #wal-view { display: none; }
  .wal-entry {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11px;
  }
  .wal-op {
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 600;
    font-size: 10px;
    white-space: nowrap;
  }
  .op-INSERT { background: #064e3b; color: var(--accent); }
  .op-UPDATE { background: #1e3a5f; color: #60a5fa; }
  .op-DELETE { background: #450a0a; color: #f87171; }
  .op-CREATE_TABLE { background: #3b1e6e; color: #c084fc; }
  .wal-time { color: var(--muted); }
  .wal-detail { color: var(--text); }

  /* Modal */
  #modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(3px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #modal-bg.open { display: flex; }
  #modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px;
  }
  #modal h3 { font-size: 15px; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .form-group input, .form-group textarea {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 12px;
    resize: vertical;
  }
  .form-group input:focus, .form-group textarea:focus {
    outline: none; border-color: var(--accent2);
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* toast */
  #toast {
    position: fixed;
    bottom: 20px; right: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 10px 16px;
    font-size: 12px;
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all .25s;
    max-width: 300px;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.error { border-left-color: var(--danger); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  #welcome {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; gap: 10px; color: var(--muted);
    text-align: center;
  }
  #welcome .big-icon { font-size: 56px; margin-bottom: 8px; }
  #welcome h2 { font-size: 18px; color: var(--text); }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="logo">
    <div class="icon">G</div>
    <div>
      <div class="name">GoDB</div>
      <div class="ver">v1.0 · localhost:8080</div>
    </div>
  </div>
  <div id="db-label">Collections</div>
  <div id="tables-list"></div>
  <button id="add-table-btn" onclick="openCreateTable()">＋ New Collection</button>
  <div id="sidebar-footer">
    <div class="status-dot"></div>
    Connected · :8080
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="toolbar">
    <span class="table-title" id="toolbar-title">Select a collection</span>
    <span class="sep">·</span>
    <span class="record-count" id="toolbar-count"></span>
    <div id="toolbar-actions">
      <button class="btn-ghost" onclick="refreshRecords()">↻ Refresh</button>
      <button class="btn-ghost" onclick="openCreateIndex()">🌳 Add Index</button>
      <button class="btn-primary" onclick="openInsert()">＋ Insert Document</button>
    </div>
  </div>

  <div id="query-bar">
    <label>FILTER</label>
    <input id="filter-input" placeholder='{"field": "value"}' title="JSON filter object" />
    <label>SORT</label>
    <input id="sort-input" placeholder="field name" />
    <label>LIMIT</label>
    <input id="limit-input" type="number" value="50" min="1" max="1000" />
    <button class="btn-ghost" onclick="runQuery()">▶ Find</button>
    <button class="btn-ghost" onclick="clearQuery()">✕</button>
  </div>

  <div id="tabs">
    <div class="tab active" onclick="switchTab('table', this)">Table View</div>
    <div class="tab" onclick="switchTab('json', this)">JSON View</div>
    <div class="tab" onclick="switchTab('wal', this)">WAL Log</div>
  </div>

  <div id="content">
    <div id="welcome">
      <div class="big-icon">🗄️</div>
      <h2>GoDB Explorer</h2>
      <p>Select a collection from the sidebar<br>or create a new one to get started.</p>
    </div>

    <!-- Table view -->
    <div id="table-view" style="display:none">
      <table id="records-table">
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
      <div id="empty-state" style="display:none">
        <div class="big">📭</div>
        <p>No documents found</p>
        <button class="btn-primary" onclick="openInsert()">Insert your first document</button>
      </div>
    </div>

    <!-- JSON view -->
    <div id="json-view"></div>

    <!-- WAL view -->
    <div id="wal-view"></div>
  </div>
</div>

<!-- Modal -->
<div id="modal-bg" onclick="closeModal(event)">
  <div id="modal">
    <h3 id="modal-title">Modal</h3>
    <div id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
const API = 'http://localhost:8080';
let currentTable = null;
let currentRecords = [];
let currentTab = 'table';

// ── API helpers ──
async function api(method, path, body) {
  try {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + path, opts);
    return await res.json();
  } catch(e) {
    return { success: false, error: 'Cannot connect to GoDB server at ' + API };
  }
}

// ── Toast ──
function toast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isError ? ' error' : '');
  setTimeout(() => t.className = '', 3000);
}

// ── Load tables ──
async function loadTables() {
  const res = await api('GET', '/tables');
  const list = document.getElementById('tables-list');
  list.innerHTML = '';
  if (!res.success) return;
  const tables = res.data || [];
  for (const t of tables) {
    const records = await api('GET', `/tables/${t}/records`);
    const count = records.success ? (records.data || []).length : 0;
    const el = document.createElement('div');
    el.className = 'table-item' + (t === currentTable ? ' active' : '');
    el.innerHTML = `<div class="dot"></div><span class="tname">${t}</span><span class="tcount">${count}</span>`;
    el.onclick = () => selectTable(t);
    list.appendChild(el);
  }
}

// ── Select table ──
async function selectTable(name) {
  currentTable = name;
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('toolbar-title').textContent = name;
  document.querySelectorAll('.table-item').forEach(el => {
    el.classList.toggle('active', el.querySelector('.tname').textContent === name);
  });
  await refreshRecords();
}

// ── Refresh records ──
async function refreshRecords() {
  if (!currentTable) return;
  const res = await api('GET', `/tables/${currentTable}/records`);
  currentRecords = res.success ? (res.data || []) : [];
  document.getElementById('toolbar-count').textContent = `${currentRecords.length} document${currentRecords.length !== 1 ? 's' : ''}`;
  renderCurrentTab();
  loadTables();
}

// ── Run query ──
async function runQuery() {
  if (!currentTable) return;
  const filterRaw = document.getElementById('filter-input').value.trim();
  const sortBy = document.getElementById('sort-input').value.trim();
  const limit = parseInt(document.getElementById('limit-input').value) || 50;

  let filter = {};
  if (filterRaw) {
    try { filter = JSON.parse(filterRaw); } catch { toast('Invalid filter JSON', true); return; }
  }

  const body = { table: currentTable, filter, limit };
  if (sortBy) body.order_by = sortBy;

  const res = await api('POST', '/query', body);
  if (!res.success) { toast(res.error, true); return; }
  currentRecords = res.data.records || [];
  document.getElementById('toolbar-count').textContent = `${currentRecords.length} result${currentRecords.length !== 1 ? 's' : ''}`;
  renderCurrentTab();
}

function clearQuery() {
  document.getElementById('filter-input').value = '';
  document.getElementById('sort-input').value = '';
  document.getElementById('limit-input').value = '50';
  refreshRecords();
}

// ── Tabs ──
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (tab === 'wal') loadWAL();
  else renderCurrentTab();
}

function renderCurrentTab() {
  document.getElementById('table-view').style.display = currentTab === 'table' ? 'block' : 'none';
  document.getElementById('json-view').style.display  = currentTab === 'json'  ? 'flex' : 'none';
  document.getElementById('wal-view').style.display   = currentTab === 'wal'   ? 'block' : 'none';
  if (currentTab === 'table') renderTable();
  if (currentTab === 'json')  renderJSON();
}

// ── Table render ──
function renderTable() {
  const head = document.getElementById('table-head');
  const body = document.getElementById('table-body');
  const empty = document.getElementById('empty-state');
  const table = document.getElementById('records-table');

  if (!currentRecords.length) {
    table.style.display = 'none';
    empty.style.display = 'flex';
    return;
  }
  table.style.display = '';
  empty.style.display = 'none';

  // Collect all keys
  const keys = new Set(['id']);
  currentRecords.forEach(r => Object.keys(r.data || {}).forEach(k => keys.add(k)));
  const cols = [...keys];

  head.innerHTML = `<tr>${cols.map(k => `<th>${k}</th>`).join('')}<th>Actions</th></tr>`;
  body.innerHTML = currentRecords.map(r => {
    const cells = cols.map(k => {
      if (k === 'id') return `<td class="id-cell">${r.id}</td>`;
      const v = r.data?.[k] ?? '';
      return `<td class="val-cell" title="${v}">${v}</td>`;
    }).join('');
    return `<tr>${cells}
      <td><div class="action-cell">
        <button class="btn-ghost btn-sm" onclick="openEdit('${r.id}')">Edit</button>
        <button class="btn-danger btn-sm" onclick="deleteRecord('${r.id}')">Del</button>
      </div></td>
    </tr>`;
  }).join('');
}

// ── JSON render ──
function renderJSON() {
  const view = document.getElementById('json-view');
  if (!currentRecords.length) { view.innerHTML = '<div style="color:var(--muted);padding:20px">No documents</div>'; return; }
  view.innerHTML = currentRecords.map(r => {
    const data = { id: r.id, ...r.data };
    const highlighted = JSON.stringify(data, null, 2)
      .replace(/("[\w]+")\s*:/g, '<span class="json-key">$1</span>:')
      .replace(/: (".*?")/g, ': <span class="json-str">$1</span>')
      .replace(/: (\d+\.?\d*)/g, ': <span class="json-num">$1</span>')
      .replace(/: (true|false)/g, ': <span class="json-bool">$1</span>');
    return `<div class="json-card">
      <div class="json-card-header">
        <span>📄</span>
        <span class="jid">${r.id}</span>
        <span style="margin-left:auto;color:var(--muted)">${Object.keys(r.data||{}).length} fields</span>
        <button class="btn-ghost btn-sm" onclick="openEdit('${r.id}')">Edit</button>
        <button class="btn-danger btn-sm" onclick="deleteRecord('${r.id}')">Delete</button>
      </div>
      <div class="json-card-body">${highlighted}</div>
    </div>`;
  }).join('');
}

// ── WAL ──
async function loadWAL() {
  const res = await api('GET', '/wal');
  const view = document.getElementById('wal-view');
  if (!res.success || !res.data?.length) {
    view.innerHTML = '<div style="color:var(--muted);padding:20px">No WAL entries yet</div>';
    return;
  }
  view.innerHTML = [...res.data].reverse().map(e => `
    <div class="wal-entry">
      <span class="wal-op op-${e.operation}">${e.operation}</span>
      <span class="wal-time">${new Date(e.timestamp).toLocaleTimeString()}</span>
      <span class="wal-detail">${e.table}${e.record_id ? ' → ' + e.record_id : ''}</span>
      ${e.data ? `<span style="color:var(--muted)">${JSON.stringify(e.data).slice(0,60)}…</span>` : ''}
    </div>`).join('');
}

// ── Modals ──
function openModal(title, bodyHTML, actions) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  document.getElementById('modal-actions').innerHTML = actions;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-bg')) return;
  document.getElementById('modal-bg').classList.remove('open');
}
function forceClose() { document.getElementById('modal-bg').classList.remove('open'); }

function openCreateTable() {
  openModal('New Collection',
    `<div class="form-group">
      <label>Collection Name</label>
      <input id="m-table-name" placeholder="e.g. users" autofocus />
    </div>`,
    `<button class="btn-ghost" onclick="forceClose()">Cancel</button>
     <button class="btn-primary" onclick="createTable()">Create</button>`
  );
}

async function createTable() {
  const name = document.getElementById('m-table-name').value.trim();
  if (!name) return toast('Enter a name', true);
  const res = await api('POST', '/tables', { name });
  if (!res.success) return toast(res.error, true);
  toast(`Collection '${name}' created`);
  forceClose();
  await loadTables();
  selectTable(name);
}

function openInsert() {
  if (!currentTable) return toast('Select a collection first', true);
  openModal('Insert Document',
    `<div class="form-group">
      <label>Document ID</label>
      <input id="m-id" placeholder="e.g. doc_001" />
    </div>
    <div class="form-group">
      <label>Data (JSON)</label>
      <textarea id="m-data" rows="6" placeholder='{\n  "name": "Ujjwal",\n  "role": "Engineer"\n}'></textarea>
    </div>`,
    `<button class="btn-ghost" onclick="forceClose()">Cancel</button>
     <button class="btn-primary" onclick="insertRecord()">Insert</button>`
  );
}

async function insertRecord() {
  const id = document.getElementById('m-id').value.trim();
  const dataRaw = document.getElementById('m-data').value.trim();
  if (!id) return toast('Enter an ID', true);
  let data;
  try { data = JSON.parse(dataRaw || '{}'); } catch { return toast('Invalid JSON', true); }
  const res = await api('POST', `/tables/${currentTable}/records`, { id, data });
  if (!res.success) return toast(res.error, true);
  toast('Document inserted');
  forceClose();
  refreshRecords();
}

function openEdit(id) {
  const rec = currentRecords.find(r => r.id === id);
  if (!rec) return;
  openModal('Edit Document',
    `<div class="form-group">
      <label>ID (read-only)</label>
      <input value="${id}" disabled style="opacity:.5" />
    </div>
    <div class="form-group">
      <label>Data (JSON)</label>
      <textarea id="m-edit-data" rows="8">${JSON.stringify(rec.data || {}, null, 2)}</textarea>
    </div>`,
    `<button class="btn-ghost" onclick="forceClose()">Cancel</button>
     <button class="btn-primary" onclick="updateRecord('${id}')">Save</button>`
  );
}

async function updateRecord(id) {
  const dataRaw = document.getElementById('m-edit-data').value.trim();
  let data;
  try { data = JSON.parse(dataRaw); } catch { return toast('Invalid JSON', true); }
  const res = await api('PUT', `/tables/${currentTable}/records/${id}`, { data });
  if (!res.success) return toast(res.error, true);
  toast('Document updated');
  forceClose();
  refreshRecords();
}

async function deleteRecord(id) {
  if (!confirm(`Delete document '${id}'?`)) return;
  const res = await api('DELETE', `/tables/${currentTable}/records/${id}`);
  if (!res.success) return toast(res.error, true);
  toast('Document deleted');
  refreshRecords();
}

function openCreateIndex() {
  if (!currentTable) return toast('Select a collection first', true);
  openModal('Create B-tree Index',
    `<div class="form-group">
      <label>Field Name</label>
      <input id="m-idx-field" placeholder="e.g. email" />
    </div>`,
    `<button class="btn-ghost" onclick="forceClose()">Cancel</button>
     <button class="btn-primary" onclick="createIndex()">Create Index</button>`
  );
}

async function createIndex() {
  const field = document.getElementById('m-idx-field').value.trim();
  if (!field) return toast('Enter a field name', true);
  const res = await api('POST', '/index', { table: currentTable, field });
  if (!res.success) return toast(res.error, true);
  toast(`Index created on '${field}'`);
  forceClose();
}

// ── Init ──
loadTables();
setInterval(loadTables, 10000); // refresh sidebar every 10s
</script>
</body>
</html>
